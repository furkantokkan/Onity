<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="780" viewBox="0 0 1200 780" role="img" aria-labelledby="title desc">
  <title id="title">Onity dependency tree</title>
  <desc id="desc">Tree-style Onity architecture diagram. Higher modules point down to lower modules. Onity.Unity sits above adapter modules, engine-free modules sit below, and Onity.Core is the base dependency.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="unity" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="adapter" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6d28d9"/>
      <stop offset="1" stop-color="#0284c7"/>
    </linearGradient>
    <linearGradient id="engineFree" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#15803d"/>
      <stop offset="1" stop-color="#4d7c0f"/>
    </linearGradient>
    <filter id="nodeShadow" x="-8%" y="-18%" width="116%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" markerWidth="11" markerHeight="11" refX="9" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,7 L10,3.5 z" fill="#93c5fd"/>
    </marker>
    <style>
      .titleText { font: 700 30px Inter, Segoe UI, Arial, sans-serif; fill: #f8fafc; }
      .subtitleText { font: 500 18px Inter, Segoe UI, Arial, sans-serif; fill: #cbd5e1; }
      .sectionText { font: 700 15px Inter, Segoe UI, Arial, sans-serif; fill: #93c5fd; letter-spacing: 0; }
      .nodeTitle { font: 700 22px Inter, Segoe UI, Arial, sans-serif; fill: #f8fafc; }
      .nodeText { font: 500 15px Inter, Segoe UI, Arial, sans-serif; fill: #dbeafe; }
      .smallText { font: 500 14px Inter, Segoe UI, Arial, sans-serif; fill: #cbd5e1; }
      .edge { stroke: #93c5fd; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .edgeThin { stroke: #64748b; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .guide { stroke: #334155; stroke-width: 2; stroke-dasharray: 7 9; }
    </style>
  </defs>

  <rect width="1200" height="780" rx="24" fill="url(#background)"/>
  <rect x="34" y="34" width="1132" height="712" rx="20" fill="#020617" opacity="0.23"/>

  <text x="64" y="82" class="titleText">Onity Dependency Tree</text>
  <text x="64" y="116" class="subtitleText">Higher modules reference lower modules only. Core stays engine-free and reusable.</text>

  <g>
    <rect x="868" y="60" width="250" height="76" rx="14" fill="#0f172a" stroke="#334155" stroke-width="2"/>
    <text x="890" y="92" class="smallText">Direction</text>
    <text x="890" y="120" class="smallText">arrows point to dependencies</text>
  </g>

  <line x1="84" y1="172" x2="1116" y2="172" class="guide"/>

  <text x="84" y="213" class="sectionText">UNITY BOUNDARY</text>
  <g filter="url(#nodeShadow)">
    <rect x="390" y="188" width="420" height="86" rx="16" fill="url(#unity)"/>
    <text x="430" y="226" class="nodeTitle">Onity.Unity</text>
    <text x="430" y="254" class="nodeText">contexts, scene flow, shortcuts, input, UI</text>
  </g>

  <path d="M600 274 L600 318" class="edge"/>

  <text x="84" y="338" class="sectionText">UNITY ADAPTERS</text>
  <g filter="url(#nodeShadow)">
    <rect x="230" y="326" width="280" height="78" rx="15" fill="url(#adapter)"/>
    <text x="264" y="360" class="nodeTitle">Onity.DOTS</text>
    <text x="264" y="386" class="nodeText">ECS / Burst bridge</text>
  </g>
  <g filter="url(#nodeShadow)">
    <rect x="690" y="326" width="280" height="78" rx="15" fill="#334155"/>
    <text x="724" y="360" class="nodeTitle">Onity.Pooling</text>
    <text x="724" y="386" class="nodeText">UnityEngine.Pool bridge</text>
  </g>

  <path d="M600 318 C600 306 370 306 370 326" class="edgeThin"/>
  <path d="M600 318 C600 306 830 306 830 326" class="edgeThin"/>

  <path d="M370 404 C370 432 955 432 955 456" class="edgeThin"/>
  <path d="M830 404 C830 432 445 432 445 456" class="edgeThin"/>

  <text x="84" y="468" class="sectionText">ENGINE-FREE MODULES</text>
  <g filter="url(#nodeShadow)">
    <rect x="80" y="456" width="210" height="76" rx="14" fill="url(#engineFree)"/>
    <text x="118" y="490" class="nodeTitle">Onity.DI</text>
    <text x="118" y="516" class="nodeText">container</text>
  </g>
  <g filter="url(#nodeShadow)">
    <rect x="340" y="456" width="210" height="76" rx="14" fill="url(#engineFree)"/>
    <text x="370" y="490" class="nodeTitle">Onity.Factory</text>
    <text x="370" y="516" class="nodeText">creation contracts</text>
  </g>
  <g filter="url(#nodeShadow)">
    <rect x="600" y="456" width="210" height="76" rx="14" fill="url(#engineFree)"/>
    <text x="624" y="490" class="nodeTitle">Onity.Reactive</text>
    <text x="624" y="516" class="nodeText">observables</text>
  </g>
  <g filter="url(#nodeShadow)">
    <rect x="860" y="456" width="240" height="76" rx="14" fill="url(#engineFree)"/>
    <text x="890" y="490" class="nodeTitle">Onity.Messaging</text>
    <text x="890" y="516" class="nodeText">publish / subscribe</text>
  </g>

  <path d="M185 532 C185 580 500 580 500 616" class="edgeThin"/>
  <path d="M445 532 L500 616" class="edgeThin"/>
  <path d="M705 532 L700 616" class="edgeThin"/>
  <path d="M980 532 C980 580 700 580 700 616" class="edgeThin"/>

  <g filter="url(#nodeShadow)">
    <rect x="390" y="616" width="420" height="86" rx="16" fill="#14532d"/>
    <text x="490" y="654" class="nodeTitle">Onity.Core</text>
    <text x="490" y="682" class="nodeText">Unit, Lifetime, DisposableAction</text>
  </g>
</svg>
